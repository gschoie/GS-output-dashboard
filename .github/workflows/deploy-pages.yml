name: 대시보드 업데이트 및 배포

on:
  workflow_dispatch:
  schedule:
    # 매일 한국시간 오전 7시 20분
    - cron: "20 22 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 이전 수집 데이터 복원
        uses: actions/cache@v4
        with:
          path: telegram_research_dashboard/data/dashboard.db
          key: dashboard-db-${{ github.run_id }}
          restore-keys: |
            dashboard-db-

      - name: 대시보드 프로그램 준비
        shell: bash
        run: |
          mkdir -p telegram_research_dashboard/static
          echo "" | base64 --decode > dashboard-app.tar.gz
          tar --no-same-permissions --no-overwrite-dir -xzf dashboard-app.tar.gz -C telegram_research_dashboard

      - name: 공개 텔레그램 최신 글 수집
        working-directory: telegram_research_dashboard
        shell: bash
        run: |
          if [ -f data/dashboard.db ]; then PAGES=5; else PAGES=0; fi
          python public_importer.py --channel https://t.me/HI_GS --pages "$PAGES"

      - name: 링크 기사 제목 및 기업 보강
        working-directory: telegram_research_dashboard
        run: python enrich_link_news.py --limit 200

      - name: 배포용 HTML 생성
        working-directory: telegram_research_dashboard
        env:
          DASHBOARD_OUTPUT: _site/index.html
        run: python build_static.py

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: telegram_research_dashboard/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4

