name: 대시보드 업데이트 및 배포

on:
  workflow_dispatch:
  schedule:
    # 매일 한국시간 오전 7시 20분
    - cron: "20 22 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 이전 수집 데이터 복원
        uses: actions/cache@v4
        with:
          path: telegram_research_dashboard/data/dashboard.db
          key: dashboard-db-${{ github.run_id }}
          restore-keys: |
            dashboard-db-

      - name: 대시보드 프로그램 준비
        shell: bash
        run: |
          mkdir -p telegram_research_dashboard/static
          echo "" | base64 --decode > dashboard-app.tar.gz
          tar --no-same-permissions --no-overwrite-dir -xzf dashboard-app.tar.gz -C telegram_research_dashboard

      - name: 수출입데이터 Colab 메뉴 추가
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path("telegram_research_dashboard/static")
          index = root / "index.html"
          html = index.read_text(encoding="utf-8")
          marker = '      <button class="nav" data-view="press">▦ <span>보도기사 취합</span></button>'
          menu = '''
                <details class="nav-group">
                  <summary>⇄ <span>수출입데이터</span></summary>
                  <div class="nav-submenu">
                    <a href="https://colab.research.google.com/drive/1Cih5yOxuL6KzSDDKWjkjWUPQA-CP7nyO?usp=sharing" target="_blank" rel="noopener">방산 · 확정</a>
                    <a href="https://colab.research.google.com/drive/1taiTQJlS2TiTkNrkfW6hauBqkj6xua3T?usp=sharing" target="_blank" rel="noopener">방산 · 잠정</a>
                    <a href="https://colab.research.google.com/drive/1Cih5yOxuL6KzSDDKWjkjWUPQA-CP7nyO?usp=sharing" target="_blank" rel="noopener">건기 · 확정</a>
                    <a href="https://colab.research.google.com/drive/1AsA6jqU-GqUfwYsNlcgrfdxsJ6upBpNo?usp=sharing" target="_blank" rel="noopener">건기 · 잠정</a>
                  </div>
                </details>
                <details class="nav-group">
                  <summary>◆ <span>도구 바로가기</span></summary>
                  <div class="nav-submenu">
                    <a href="https://gemini.google.com/gem/6c5032cc72cc?usp=sharing" target="_blank" rel="noopener">기업.톺아보기</a>
                    <a href="https://gemini.google.com/gem/7567970d123e?usp=sharing" target="_blank" rel="noopener">TW번역</a>
                    <a href="https://gemini.google.com/gem/6de4c11680fc" target="_blank" rel="noopener">해외방산뉴스.요약-텔레</a>
                    <a href="https://gemini.google.com/gem/7a05ed301b3e?usp=sharing" target="_blank" rel="noopener">한국기사.요약-텔레</a>
                    <a href="https://gemini.google.com/gem/1VAk4wJP8zKwjfqx8lL9cF7HDakePAEp_?usp=sharing" target="_blank" rel="noopener">오탈자.체크</a>
                    <a href="https://gemini.google.com/gem/faaa023705b8" target="_blank" rel="noopener">재무제표.점검</a>
                    <a href="https://gemini.google.com/gem/a7f3fb1d0136" target="_blank" rel="noopener">답안한 애널 찾기</a>
                    <a href="https://postyud.parkingweb.kr/login" target="_blank" rel="noopener">포스트타워.주차</a>
                    <a href="https://script.google.com/home/projects/1RkSI__bcEObST0a6Ig5zgXL9GPHdIOCBTViYZziCC-wTcHPOk3QUnWlu/edit?hl=ko" target="_blank" rel="noopener">환율 다운로드.GAS</a>
                  </div>
                </details>'''
          if "수출입데이터" not in html:
              if marker not in html:
                  raise RuntimeError("사이드바 기준 위치를 찾지 못했습니다.")
              index.write_text(html.replace(marker, marker + menu), encoding="utf-8")

          styles = root / "styles.css"
          css = styles.read_text(encoding="utf-8")
          extra = '''
          .nav-group{color:#9fafaa}.nav-group summary{list-style:none;border-radius:8px;padding:12px 14px;font-size:14px;cursor:pointer}.nav-group summary::-webkit-details-marker{display:none}.nav-group summary span{margin-left:10px}.nav-group summary:hover,.nav-group[open] summary{background:#264039;color:white}.nav-group[open] summary{margin-bottom:7px}.nav-submenu{display:grid;gap:5px;margin-left:18px;padding-left:13px;border-left:1px solid #365047}.nav-submenu a{color:#aebdb7;text-decoration:none;border-radius:6px;padding:9px 10px;font-size:12px;line-height:1.25}.nav-submenu a:hover{background:#203a33;color:var(--lime)}
          @media(max-width:950px){.nav-group span,.nav-submenu{display:none}}
          '''
          if ".nav-group{" not in css:
              styles.write_text(css + extra, encoding="utf-8")
          PY

      - name: 공개 텔레그램 최신 글 수집
        working-directory: telegram_research_dashboard
        shell: bash
        run: |
          if [ -f data/dashboard.db ]; then PAGES=5; else PAGES=0; fi
          python public_importer.py --channel https://t.me/HI_GS --pages "$PAGES"

      - name: 링크 기사 제목 및 기업 보강
        working-directory: telegram_research_dashboard
        run: python enrich_link_news.py --limit 200

      - name: 배포용 HTML 생성
        working-directory: telegram_research_dashboard
        env:
          DASHBOARD_OUTPUT: _site/index.html
        run: python build_static.py

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: telegram_research_dashboard/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
